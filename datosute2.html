<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS - Texto sobre Imagen</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 40px;
            margin: 0;
            display: flex;
            justify-content: end; /* Centra el contenedor en la pantalla */
            align-items: center;
            min-height: 100vh;
        }

        /* 1. EL CONTENEDOR PRINCIPAL (Contiene la imagen base) */
        .image-overlay-container {
            position: relative; /* Esencial: establece el marco de referencia para el texto */
            max-width: 1000px; /* Ancho máximo deseado */
            width: 100%;
            height: 900px; /* Altura fija para mantener la proporción */
            border-radius: 12px;
            overflow:visible; /* Asegura que nada sobresalga de las esquinas redondeadas */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* La imagen de fondo */
        .base-image {
            width: 100%;
            height: auto;
            display: block; /* Elimina espacio en blanco inferior */
        }

        /* 2. LA TARJETA DE TEXTO (Superpuesta) */
        .text-card-overlay {
            position: absolute; /* Se posiciona relativo al contenedor .image-overlay-container */
            
            /* Posicionamiento a la DERECHA */
            top: 75%; /* Centrado verticalmente respecto al top */
            right: 20%; /* Separación del borde derecho */
            transform: translateY(-50%); /* Ajuste preciso para el centrado vertical */

            /* Diseño de la tarjeta */
            width: 350px; /* Ancho fijo para la tarjeta de texto */
            background-color: rgba(255, 255, 255, 0.85); /* Fondo blanco 85% opaco para legibilidad */
            backdrop-filter: blur(10px); /* Efecto de cristal esmerilado opcional */
            padding: 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            
            /* Asegura que el texto sea legible */
            color: #1a1a1a; 
            z-index: 10; /* Asegura que esté por encima de la imagen */
        }

        /* Estilos de texto dentro de la tarjeta */
        .text-card-overlay h2 {
            font-size: 1.4rem;
            color: #2c82cb; /* Azul ArcGIS */
            margin-top: 0;
            text-transform: uppercase;
            border-bottom: 2px solid #2c82cb;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .text-card-overlay p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
        }

        .app-name {
            font-weight: 700;
        }

    </style>
</head>
<body>

    <div class="image-overlay-container">
        
        <img src="https://github.com/nramirezh/notas/blob/ffa4b396f28952a4d5bccf724dcbfb23e08bddca/imagenes/app.jpg?raw=true" alt="ArcGIS Apps en campo" class="base-image">

        <div class="text-card-overlay">
            <h2>Tecnología de Campo</h2>
            <p>
                Empleo de aplicaciones del conjunto de software de <span class="app-name">ArcGIS</span> para la recolección de datos mediante formularios (<span class="app-name">Survey 123</span>), en tiempo real registrando elementos (<span class="app-name">QuickCapture</span>) o trabajando directamente sobre mapas a través de la aplicación <span class="app-name">Field Maps</span>.
            </p>
        </div>

    </div>

</body>
</html>
